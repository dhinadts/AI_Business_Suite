<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DHINADTS ERP - AI Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            animation: scan 2.5s ease-in-out infinite;
        }
        .edge-glow {
            box-shadow: 0 0 15px rgba(253, 139, 0, 0.4);
        }
        .shutter-active:active {
            transform: scale(0.9);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#aec7f6",
                        "on-tertiary-fixed-variant": "#004f4f",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-variant": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#2f1500",
                        "primary-fixed": "#d6e3ff",
                        "tertiary": "#000d0d",
                        "secondary-container": "#fd8b00",
                        "on-primary-fixed-variant": "#2d476f",
                        "secondary": "#904d00",
                        "primary-container": "#002147",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed": "#002020",
                        "background": "#f8f9fa",
                        "surface-container": "#edeeef",
                        "on-surface-variant": "#44474e",
                        "primary-fixed-dim": "#aec7f6",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f3f4f5",
                        "outline-variant": "#c4c6cf",
                        "inverse-surface": "#2e3132",
                        "on-secondary-container": "#603100",
                        "on-error": "#ffffff",
                        "surface": "#f8f9fa",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1d",
                        "surface-tint": "#465f88",
                        "secondary-fixed-dim": "#ffb77d",
                        "surface-dim": "#d9dadb",
                        "on-secondary-fixed-variant": "#6e3900",
                        "tertiary-container": "#002626",
                        "on-tertiary-container": "#2f9696",
                        "outline": "#74777f",
                        "primary": "#000a1e",
                        "on-background": "#191c1d",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#76d6d5",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001b3d",
                        "tertiary-fixed": "#93f2f2",
                        "surface-container-high": "#e7e8e9",
                        "secondary-fixed": "#ffdcc3",
                        "on-primary-container": "#708ab5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "section-gap": "32px",
                        "gutter": "16px",
                        "container-margin": "24px",
                        "card-padding": "20px"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-sm": ["10px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-1px", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black overflow-hidden select-none font-body-md text-body-md">
<!-- Camera Viewfinder -->
<div class="fixed inset-0 z-0">
<div class="w-full h-full bg-cover bg-center opacity-80" data-alt="A top-down view of a modern business invoice resting on a dark wooden office desk, partially obscured by a bright orange rectangular scanning frame. The lighting is crisp and professional, creating high-contrast shadows. The scene has a cinematic, high-tech SaaS aesthetic with deep navy and vibrant orange accents." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAljKn-0_hsXoVZJHc9uUIoTEQMui0DRoWtRx4hM-dQQhyjbwRsBBEaqvGiQCKGMCapprvavQ_AYSmZL84ClVETcMbE9fWTaYeVt3FxXxMLGTCY3JOCmVupWozmKojgpNTmTyErHbWpYIdcDQX_z7XCOVV9qom3goI9OXuYL0sS1LMkSTItN0y7j4XozFyOFhvG2CMqV58pPbuqtK4cPkLjZbE_RX9f0FD33eWjSKj6oqjG3JDlSM8QCwl6LjuC3Urbtmw5O_-P5lQ')"></div>
<!-- Gradient Overlay for readability -->
<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/60"></div>
</div>
<!-- Top Navigation (Standalone Header as per Shell Visibility Rules - suppressed global TopAppBar for focus) -->
<div class="fixed top-0 left-0 w-full px-container-margin h-16 flex justify-between items-center z-50 text-white">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 backdrop-blur-md">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex flex-col items-center">
<span class="font-headline-sm text-headline-sm font-bold tracking-tight">AI SCANNER</span>
<span class="font-label-sm text-label-sm opacity-80 uppercase tracking-widest">Document Detection</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 backdrop-blur-md" id="flash-toggle">
<span class="material-symbols-outlined">flash_on</span>
</button>
</div>
<!-- Document Guide Overlay -->
<div class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none">
<div class="relative w-[85%] aspect-[1/1.414] border-2 border-secondary-container/40 rounded-xl overflow-hidden edge-glow">
<!-- Corners -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-secondary-container rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-secondary-container rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-secondary-container rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-secondary-container rounded-br-xl"></div>
<!-- Laser Scan Line -->
<div class="scan-line absolute left-0 right-0 h-1 bg-gradient-to-r from-transparent via-secondary-container to-transparent shadow-[0_0_15px_rgba(253,139,0,1)]"></div>
<!-- AI Mesh Grid Effect -->
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#fd8b00 1px, transparent 1px); background-size: 24px 24px;"></div>
</div>
</div>
<!-- Status Messages -->
<div class="fixed bottom-32 left-0 w-full flex flex-col items-center gap-2 z-20 px-container-margin">
<div class="flex items-center gap-2 bg-black/40 backdrop-blur-xl px-4 py-2 rounded-full border border-white/10">
<div class="w-2 h-2 bg-secondary-container rounded-full animate-pulse"></div>
<span class="text-white font-label-lg text-label-lg uppercase tracking-wider" id="status-text">Detecting edges...</span>
</div>
<span class="text-white/60 font-label-sm text-label-sm">Position the invoice within the frame</span>
</div>
<!-- Scanning Progress Bar -->
<div class="fixed bottom-[112px] left-1/2 -translate-x-1/2 w-[60%] h-1 bg-white/20 rounded-full overflow-hidden z-20">
<div class="h-full bg-secondary-container w-2/3 rounded-full transition-all duration-700" id="progress-bar"></div>
</div>
<!-- Bottom Controls -->
<div class="fixed bottom-0 left-0 w-full h-28 flex justify-around items-center px-container-margin pb-safe z-50 bg-gradient-to-t from-black/90 to-transparent">
<!-- Gallery Button -->
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-white/10 border border-white/20 group-active:scale-95 transition-all">
<span class="material-symbols-outlined text-white">image</span>
</div>
<span class="text-white font-label-sm text-label-sm opacity-70">Gallery</span>
</button>
<!-- Capture Button Shell -->
<div class="relative flex items-center justify-center">
<div class="absolute w-24 h-24 rounded-full border-2 border-white/30 animate-[spin_10s_linear_infinite]"></div>
<div class="absolute w-20 h-20 rounded-full border-2 border-secondary-container animate-[ping_3s_ease-in-out_infinite]"></div>
<button class="shutter-active relative w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-lg transition-transform">
<div class="w-14 h-14 border-2 border-black/10 rounded-full"></div>
</button>
</div>
<!-- Mode Toggle / History -->
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-white/10 border border-white/20 group-active:scale-95 transition-all">
<span class="material-symbols-outlined text-white">history</span>
</div>
<span class="text-white font-label-sm text-label-sm opacity-70">History</span>
</button>
</div>
<!-- Bottom Navigation Mock (Hidden as per Destination Rule: Focused Task) -->
<!-- The BottomNavBar is suppressed because this is a focused Task-Flow screen -->
<script>
        // Micro-interactions for status updates
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const messages = ["Aligning document...", "Detecting edges...", "Reading GSTIN...", "Scanning totals..."];
        let currentMsg = 0;

        setInterval(() => {
            currentMsg = (currentMsg + 1) % messages.length;
            statusText.style.opacity = 0;
            setTimeout(() => {
                statusText.innerText = messages[currentMsg];
                statusText.style.opacity = 1;
                progressBar.style.width = `${(currentMsg + 1) * 25}%`;
            }, 300);
        }, 3000);

        // Flash toggle simulation
        const flashBtn = document.getElementById('flash-toggle');
        let flashOn = false;
        flashBtn.addEventListener('click', () => {
            flashOn = !flashOn;
            flashBtn.querySelector('span').innerText = flashOn ? 'flash_off' : 'flash_on';
            flashBtn.classList.toggle('bg-secondary-container', flashOn);
            flashBtn.classList.toggle('text-on-secondary-container', flashOn);
        });

        // Haptic feedback simulation
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (navigator.vibrate) {
                    navigator.vibrate(10);
                }
            });
        });
    </script>
</body></html>
