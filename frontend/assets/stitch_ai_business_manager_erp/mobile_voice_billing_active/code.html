<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice Assistant Listening - DHINADTS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom pulse animation for the microphone */
        @keyframes custom-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(253, 139, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(253, 139, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(253, 139, 0, 0); }
        }
        .animate-voice-pulse {
            animation: custom-pulse 2s infinite ease-in-out;
        }

        /* Waveform bars animation */
        @keyframes wave-grow {
            0%, 100% { height: 8px; }
            50% { height: 32px; }
        }
        .wave-bar {
            width: 4px;
            background-color: #fd8b00;
            border-radius: 2px;
            animation: wave-grow 1.2s infinite ease-in-out;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { animation-delay: 0.6s; }

        /* Smooth scroll for transcript */
        #transcript-container {
            scroll-behavior: smooth;
        }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

                        "surface-container-highest": "#e1e3e4",
                        "on-secondary": "#ffffff",
                        "on-surface": "#191c1d",
                        "on-primary-fixed-variant": "#2d476f",
                        "inverse-on-surface": "#f0f1f2",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#004f4f",

                        "tertiary": "#000d0d",
                        "secondary-container": "#fd8b00",
                        "on-primary": "#ffffff",

                        "secondary": "#904d00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "container-margin": "24px",
                        "base": "8px",
                        "card-padding": "20px",
                        "section-gap": "32px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],

                        "headline-lg": ["Inter"],

    body {

<body class="bg-primary text-on-primary font-body-md overflow-hidden selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Top App Bar (Shared Component Logic) -->
<header class="bg-primary dark:bg-surface-container-low fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin h-16 border-b border-outline/20">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-variant/20 transition-colors">
<span class="material-symbols-outlined text-on-primary" data-icon="close">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold tracking-tight text-white">Voice Assistant Listening</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-surface-variant/20 transition-colors">
<span class="material-symbols-outlined text-white" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex flex-col h-screen pt-16 pb-20 px-container-margin overflow-hidden relative">
<!-- Ambient Decorative Elements (AI Layer) -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-secondary rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-primary-container rounded-full blur-[100px]"></div>
</div>
<!-- Section: Visualizer and Status -->
<div class="flex-none flex flex-col items-center justify-center py-10 z-10">
<!-- Listening... Waveform -->
<div class="flex items-center gap-1.5 h-10 mb-4">
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
</div>
<span class="font-label-lg text-label-lg text-secondary-fixed uppercase tracking-widest animate-pulse">Listening...</span>
</div>
<!-- Section: Large Pulse Microphone -->
<div class="flex-1 flex items-center justify-center z-10">
<button class="w-40 h-40 bg-secondary-container rounded-full flex items-center justify-center animate-voice-pulse shadow-2xl group active:scale-95 transition-all" id="mic-button">
<span class="material-symbols-outlined text-white text-6xl" data-icon="settings_voice" style="font-variation-settings: 'FILL' 1;">settings_voice</span>
</button>
</div>
<!-- Section: Live Transcript Area -->
<div class="flex-none w-full max-w-md mx-auto mb-10 z-10">
<div class="bg-surface-container-lowest/5 backdrop-blur-md border border-white/10 rounded-xl p-card-padding h-48 flex flex-col">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-secondary-container text-lg" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label-lg text-label-lg text-outline-variant uppercase">Real-time Transcript</span>
</div>
<div class="flex-1 overflow-y-auto no-scrollbar space-y-4 pr-2" id="transcript-container">
<p class="font-body-lg text-body-lg text-white/40 italic">Wait, let me just check...</p>
<p class="font-body-lg text-body-lg text-white/60">"Searching for Micro-Processor units in Bangalore warehouse..."</p>
<p class="font-body-lg text-body-lg text-white font-medium leading-relaxed">
                        "Add 50 units of <span class="text-secondary-fixed underline decoration-secondary-container">Micro-Processor X10</span> to the cart and apply the bulk discount..."
                        <span class="inline-block w-1.5 h-5 bg-secondary-container ml-1 animate-pulse align-middle"></span>
</p>
</div>
</div>
</div>
<!-- Section: Bottom Controls -->
<div class="flex gap-4 w-full max-w-md mx-auto z-10 pb-8">
<button class="flex-1 py-4 px-6 bg-transparent border-2 border-outline-variant/30 rounded-xl font-label-lg text-label-lg text-white hover:bg-white/10 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="cancel">cancel</span>
                CANCEL
            </button>
<button class="flex-1 py-4 px-6 bg-error rounded-xl font-label-lg text-label-lg text-white hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg shadow-error/20" id="stop-btn">
<span class="material-symbols-outlined" data-icon="stop" style="font-variation-settings: 'FILL' 1;">stop</span>
                STOP
            </button>
</div>

<!-- Bottom Navigation Bar (Shared Component - Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-2 pb-safe lg:hidden bg-primary border-t border-white/10">
<!-- Home -->

</button>

<span class="material-symbols-outlined" data-icon="settings_voice" style="font-variation-settings: 'FILL' 1;">settings_voice</span>

</button>

<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
<span class="font-label-sm text-label-sm mt-1">Menu</span>
</button>
</nav>
<script>
        // Micro-interactions and auto-scrolling transcript
        const transcriptContainer = document.getElementById('transcript-container');
        const micButton = document.getElementById('mic-button');
        const stopButton = document.getElementById('stop-btn');

        // Simple loop to simulate transcript scrolling
        setInterval(() => {
            transcriptContainer.scrollTop = transcriptContainer.scrollHeight;
        }, 1000);

        // Interaction for stop button
        stopButton.addEventListener('click', () => {
            micButton.classList.remove('animate-voice-pulse');
            micButton.classList.add('opacity-50');
            micButton.innerHTML = `<span class="material-symbols-outlined text-white text-6xl" data-icon="check">check</span>`;
            document.querySelector('.animate-pulse').textContent = 'Processing...';
            document.querySelectorAll('.wave-bar').forEach(bar => {
                bar.style.animation = 'none';
                bar.style.height = '4px';
            });
            setTimeout(() => {
                alert('Voice command captured and processing invoice...');
            }, 500);
        });

        // Click on mic to toggle focus feel
        micButton.addEventListener('click', () => {
            micButton.classList.toggle('scale-110');
            setTimeout(() => micButton.classList.toggle('scale-110'), 200);
        });
    </script>
</body></html>
